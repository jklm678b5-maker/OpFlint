name: Build Mod Jar

on:
  push:
  workflow_dispatch:

defaults:
  run:
    working-directory: flintnohitbox

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Install Gradle 2.14
        run: |
          curl -L -o gradle-2.14-bin.zip https://services.gradle.org/distributions/gradle-2.14-bin.zip
          unzip -q gradle-2.14-bin.zip -d $HOME
          echo "$HOME/gradle-2.14/bin" >> $GITHUB_PATH

      - name: Setup Forge decompiled workspace
        run: gradle setupDecompWorkspace --no-daemon --stacktrace

      - name: Build jar
        run: gradle build --no-daemon --stacktrace

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: flintnohitbox-jar
          path: flintnohitbox/build/libs/*.jar
